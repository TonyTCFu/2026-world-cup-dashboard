<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 强制浏览器每次检查最新版本，防止手机端 Web App 缓存旧页面 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>🏆 2026年世界杯每日战报 Dashboard</title>
  <!-- 设置浏览器标签页的世界杯奖杯图标 (Favicon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
  <!-- 引入 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- 引入 FontAwesome 图标 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- 引入自定义样式 (增加版本号用于防缓存) -->
  <link rel="stylesheet" href="css/style.css?v=1.0.18">
</head>
<body>
  <!-- 背景环境光源 (Aesthetic Glows) -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <div class="container">
    <!-- 头部区域 (Header) -->
    <header class="header card animate-fade-in">
      <div class="header-main">
        <div class="brand">
          <div class="brand-logo">
            <i class="fa-solid fa-trophy trophy-icon"></i>
          </div>
          <div class="brand-text">
            <h1>2026 FIFA WORLD CUP</h1>
            <p class="brand-subtitle">每日赛程快报 & 战况分析 Dashboard</p>
          </div>
        </div>
        <div class="header-meta">
          <div class="meta-item">
            <span class="meta-label"><i class="fa-solid fa-calendar-day"></i> 当前进度</span>
            <span class="meta-value text-gradient" id="header-matchday">第8比赛日 (小组赛)</span>
          </div>
          <div class="meta-item">
            <span class="meta-label"><i class="fa-solid fa-clock"></i> 数据更新时间</span>
            <span class="meta-value" id="header-update-time">2026-06-18 12:30</span>
          </div>
        </div>
      </div>

      <!-- 快捷全局赛事概览栏 (Quick Stats Banner) -->
      <div class="quick-stats">
        <div class="stat-box">
          <span class="stat-num" id="stat-matches">15 / 104</span>
          <span class="stat-desc">已赛场次</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-box">
          <span class="stat-num" id="stat-goals">29</span>
          <span class="stat-desc">总进球数</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-box">
          <span class="stat-num" id="stat-avg-goals">1.93</span>
          <span class="stat-desc">场均进球</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-box">
          <span class="stat-num" id="stat-scorer">穆西亚拉 / 瓦伦西亚 (2球)</span>
          <span class="stat-desc">射手榜首</span>
        </div>
      </div>
    </header>

    <!-- 导航标签页 (Tab controls) -->
    <nav class="nav-tabs animate-fade-in">
      <button class="tab-btn active" data-tab="tab-schedule">
        <i class="fa-solid fa-calendar-days"></i> 今日赛程
      </button>

      <button class="tab-btn" data-tab="tab-knockout">
        <i class="fa-solid fa-diagram-project"></i> 淘汰赛对阵
      </button>
    </nav>

    <!-- 主要内容呈现区 (Main Content Panels) -->
    <main class="main-content">
      
      <!-- Panel 1: 赛程日历 -->
      <section id="tab-schedule" class="tab-panel active">
        <!-- 日历日期选择滑动条 -->
        <div class="date-slider-container card animate-fade-in">
          <button class="slider-arrow prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <div class="date-slider" id="date-slider">
            <!-- 由 JS 动态填充日期卡片 -->
          </div>
          <button class="slider-arrow next-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="panel-header animate-fade-in">
          <h2><i class="fa-solid fa-calendar-day"></i> <span id="schedule-date-title">2026年6月18日</span> 赛程</h2>
          <span class="match-count-badge" id="schedule-match-count">4 场比赛</span>
        </div>

        <div class="match-grid" id="match-schedule-list">
          <!-- 由 JS 动态填充赛程卡片 -->
        </div>
      </section>


      <!-- Panel 4: 淘汰赛对阵 -->
      <section id="tab-knockout" class="tab-panel">
        <!-- 淘汰赛对阵内容由 JS 动态生成 -->
      </section>


    </main>

    <!-- 底部版权信息 -->
    <footer class="footer animate-fade-in">
      <p>&copy; 2026 FIFA World Cup Daily Dashboard. Powered by Antigravity AI Engine.</p>
      <p class="footer-note">数据基于实时网络搜索及世界杯赛程统计进行每日更新。</p>
    </footer>
  </div>

  <!-- 详情弹窗 (Modal) 用于查看单场比赛详细战术分析或图表 -->
  <div class="modal" id="match-detail-modal">
    <div class="modal-content card">
      <button class="modal-close" id="modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
      <div id="modal-body-content">
        <!-- 弹窗内容动态加载 -->
      </div>
    </div>
  </div>

  <!-- 引入核心数据 (增加版本号用于防缓存) -->
  <script src="src/data.js?v=1.0.18"></script>
  <script src="js/app.js?v=1.0.18"></script>
</body>
</html>
