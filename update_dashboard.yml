name: Auto Update World Cup 2026 Dashboard

on:
  schedule:
    # 每6小时自动运行一次更新 (UTC 时间 00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许用户在 GitHub 仓库 Actions 页面上手动点击一键运行

# 设定推送和部署所需的写权限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v4

    - name: 配置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 运行自动更新脚本
      run: node scripts/auto_update.js

    - name: 提交并推送比分更改
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add src/data.js
        # 检测文件是否有变动，若有变动则提交并推送
        if ! git diff --cached --quiet; then
          git commit -m "chore: auto-update world cup scoreboard [skip ci]"
          git push
        else
          echo "今日赛事比分无新数据变化，无需提交。"
        fi

    - name: 部署发布至 GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: . # 部署根目录中的静态页面
        branch: gh-pages # 部署到 gh-pages 分支，开启 GitHub Pages 托管
        token: ${{ secrets.GITHUB_TOKEN }}
